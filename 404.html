<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0d0d0d;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.container{max-width:520px}

p{font-size:15px;color:rgba(255,255,255,0.5);line-height:1.8;margin-bottom:32px}
a.btn{display:inline-block;background:#C4A265;color:#0d0d0d;padding:13px 26px;border-radius:4px;font-size:13px;font-weight:500;letter-spacing:0.04em;text-decoration:none;transition:background 0.2s,transform 0.2s}
a.btn:hover{background:#D4B87A;transform:translateY(-2px)}
.sub-links{margin-top:24px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.sub-links a{font-size:13px;color:rgba(255,255,255,0.4);text-decoration:none;transition:color 0.2s}
.sub-links a:hover{color:#C4A265}
</style>
</head>
<body>
